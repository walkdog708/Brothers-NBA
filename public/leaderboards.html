<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brothers NBA - Leaderboards</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                brand: {
                  50: "#f8fafc",
                  100: "#e2e8f0",
                  300: "#94a3b8",
                  500: "#475569",
                  700: "#1e293b",
                  900: "#0f172a"
                },
                accent: {
                  400: "#fb923c",
                  500: "#f97316",
                  600: "#ea580c"
                },
                gold: {
                  300: "#fde68a",
                  400: "#facc15",
                  500: "#eab308",
                  600: "#ca8a04"
                }
              },
              boxShadow: {
                card: "0 8px 24px rgba(15, 23, 42, 0.08)"
              }
            }
          }
        };
    </script>

    <style>
        .message {
          margin-top: 14px;
          font-weight: 600;
        }

        .message.error {
          color: #b91c1c;
        }

        .message.success {
          color: #15803d;
        }

        .message.info {
          color: #1d4ed8;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen">
<div id="sharedHeader"></div>

<main class="max-w-7xl mx-auto px-4 py-6 space-y-6">
    <!-- Hero -->
    <section class="rounded-3xl bg-gradient-to-r from-slate-950 via-slate-900 to-amber-500 text-white shadow-2xl p-8 sm:p-10 border border-amber-300/30">
        <div class="max-w-3xl mx-auto text-center">
            <h1 class="text-4xl sm:text-5xl md:text-6xl font-black tracking-tight">
                <span class="text-white">Leader</span><span class="text-amber-200">boards</span>
            </h1>

            <p class="mt-4 text-base sm:text-lg md:text-xl text-white/90 leading-relaxed">
                Track the season standings and see how everyone stacks up throughout the NBA playoffs.
            </p>
        </div>
    </section>

    <!-- Filters -->
    <section class="bg-white border border-amber-200 rounded-2xl shadow-xl p-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 items-end">
            <div class="max-w-sm">
                <label for="season" class="block text-sm font-semibold text-slate-900 mb-2">Season</label>
                <input
                        id="season"
                        type="number"
                        value="2026"
                        class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-slate-900 outline-none transition focus:border-orange-500 focus:ring-2 focus:ring-orange-200"
                />
            </div>
        </div>

        <div id="message" class="message mt-5"></div>
    </section>

    <!-- Leaderboard table -->
    <section class="bg-white border border-slate-200 rounded-2xl shadow-xl overflow-hidden">
        <div class="px-6 py-5 border-b border-slate-200 bg-slate-50">
            <h2 class="text-xl font-bold text-slate-900">Season Standings</h2>
            <p class="mt-1 text-sm text-slate-600">
                Total points accumulated through all rounds, ranked from highest to lowest.
            </p>
        </div>

        <div class="overflow-x-auto">
            <table class="min-w-full text-sm">
                <thead class="bg-slate-100 text-slate-700">
                <tr>
                    <th class="px-4 py-3 text-left font-semibold border-b border-slate-200">Rank</th>
                    <th class="px-4 py-3 text-left font-semibold border-b border-slate-200">Username</th>
                    <th class="px-4 py-3 text-left font-semibold border-b border-slate-200">Total Points</th>
                    <th class="px-4 py-3 text-left font-semibold border-b border-slate-200">Correct Winners</th>
                    <th class="px-4 py-3 text-left font-semibold border-b border-slate-200">Bonus Points</th>
                </tr>
                </thead>
                <tbody id="leaderboardTableBody" class="divide-y divide-slate-200 bg-white">
                <tr>
                    <td colspan="7" class="px-4 py-6 text-center text-slate-500">
                        No leaderboard loaded.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script src="/js/leaderboards.js"></script>
<script src="/js/shared-header.js"></script>
</body>
</html>
