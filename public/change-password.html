<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brothers NBA - Change Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/theme.css" />
</head>
<body class="bg-gray-100 min-h-screen">

<header class="bg-slate-800 text-white shadow">
    <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
        <a href="/home.html" class="text-xl font-bold">Brothers NBA</a>
        <button id="logoutBtn" class="text-sm bg-white/10 hover:bg-white/20 px-3 py-2 rounded-lg">
            Logout
        </button>
    </div>
</header>

<main class="max-w-md mx-auto px-4 py-10">
    <div class="bg-white rounded-2xl shadow p-6">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Change your password</h1>
        <p class="text-sm text-gray-600 mb-6">
            Your account is using a temporary password. You must change it before accessing MyPicks, Results, or Leaderboards.
        </p>

        <div id="message" class="hidden mb-4 rounded-lg px-4 py-3 text-sm"></div>

        <form id="changePasswordForm" class="space-y-4">
            <div>
                <label for="currentPassword" class="block text-sm font-medium text-gray-700 mb-1">
                    Current password
                </label>
                <input
                        id="currentPassword"
                        name="currentPassword"
                        type="password"
                        autocomplete="current-password"
                        class="w-full rounded-xl border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-500"
                        required
                />
            </div>

            <div>
                <label for="newPassword" class="block text-sm font-medium text-gray-700 mb-1">
                    New password
                </label>
                <input
                        id="newPassword"
                        name="newPassword"
                        type="password"
                        autocomplete="new-password"
                        class="w-full rounded-xl border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-500"
                        required
                />
                <p class="text-xs text-gray-500 mt-1">Must be at least 6 characters.</p>
            </div>

            <div>
                <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">
                    Confirm new password
                </label>
                <input
                        id="confirmPassword"
                        name="confirmPassword"
                        type="password"
                        autocomplete="new-password"
                        class="w-full rounded-xl border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-500"
                        required
                />
            </div>

            <button
                    id="submitBtn"
                    type="submit"
                    class="w-full rounded-xl bg-slate-800 hover:bg-slate-900 text-white font-medium py-2.5"
            >
                Update Password
            </button>
        </form>
    </div>
</main>

<script src="/js/change-password.js"></script>
</body>
</html>
